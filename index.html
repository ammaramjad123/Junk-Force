<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Title -->
    <title>
      JunkForce | Fast, Reliable & Eco-Friendly Junk Removal
    </title>

    <!-- SEO Meta Description -->
    <meta
      name="description"
      content="Need fast junk removal? JunkForce provides reliable, affordable and eco-friendly junk removal services with same-day availability. Free estimates available."
    />

    <!-- Keywords -->
    <meta
      name="keywords"
      content="junk removal, furniture removal, appliance disposal, yard waste removal, commercial cleanout, eco-friendly junk removal"
    />

    <!-- Author -->
    <meta name="author" content="JunkForce" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="JunkForce | Professional Junk Removal Services"
    />
    <meta
      property="og:description"
      content="Same-day junk removal with transparent pricing and eco-friendly disposal. Free quotes available."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="/og.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="JunkForce | Fast & Affordable Junk Removal"
    />
    <meta
      name="twitter:description"
      content="Clear out your space today. Professional junk removal with no hidden fees."
    />
    <meta name="twitter:image" content="/og.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0a1a2c" />

    <!-- Tailwind CSS -->
    <link href="/src/index.css" rel="stylesheet" />
  </head>

  <body>
    <!-- React Root -->
    <div id="root"></div>

    <!-- Script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
